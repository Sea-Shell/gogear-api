---
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

name: Linting
jobs:
  commit-lint:
    name: Commit linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
      actions: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest

      - name: Check blocked package versions
        run: npm run check:blocked-deps

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Check commit messages
        run: npm run semantic-release-dry-run

      - name: Comment on Pull Request
        if: ${{ failure() }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.warning('No pull request context available to post a comment.');
              return;
            }

            const commentBody = fs.existsSync('semantic-release-check.log')
              ? fs.readFileSync('semantic-release-check.log', 'utf8')
              : 'Semantic release check failed';

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody,
            });
  golang-lint:
    name: Golang linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26

      - name: Setup revive
        shell: bash
        run:
          go install github.com/mgechev/revive@latest
      
      - name: Lint
        shell: bash
        run:
          revive -config revive.toml
